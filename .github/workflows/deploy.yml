name: Deploy Next.js Static Export to Pages

on:
  push:
    branches: ["main"] # Automatically runs whenever you push code to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build

      - name: Upload Static Folder
        uses: actions/upload-pages-artifact@v3
        with:
          # Next.js compiles static files into the 'out' folder
          path: './out' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4